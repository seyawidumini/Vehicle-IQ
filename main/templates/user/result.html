<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{url_for('static',filename='form.css')}}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
</head>
<body>
    <!-- Your navbar & hero same as predict.html -->
    
    <section class="hero">
        <div class="hero-content">
            <div class="hero-label">PREDICTION RESULT</div>
            <h1 class="hero-title">Your Car Value <span class="hero-highlight">₹{{ "%.2f"|format(prediction) }}</span></h1>
            <p class="hero-subtitle">Vehicle price prediction based on advanced ML model analysis</p>
            
            <!-- Price Card -->
            <div class="price-card">
                <div class="price-icon">
                    <i class="fas fa-car"></i>
                </div>
                <div class="price-details">
                    <h2>Predicted Market Price</h2>
                    <div class="price-amount">₹{{ "%.2f"|format(prediction) }}</div>
                    <div class="price-range">
                        <span>Market Range: ₹15.2M - ₹17.8M</span>
                    </div>
                </div>
                <div class="price-badge">99% Confidence</div>
            </div>

            <!-- Back to form -->
            <a href="{{ url_for('prediction.predict') }}" class="hero-cta secondary">
                <i class="fas fa-arrow-left"></i>
                New Prediction
            </a>
        </div>
    </section>
</body>
</html>
