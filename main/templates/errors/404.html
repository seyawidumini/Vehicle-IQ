{% extends "errors/base.html" %}
{% block title %}404 Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center text-center py-24 px-6">
    <span class="material-symbols-outlined text-primary text-6xl mb-4">search_off</span>
    
    <h1 class="text-4xl font-headline font-extrabold text-primary mb-2">404</h1>
    <h2 class="text-xl font-headline font-bold mb-4">Page Not Found</h2>
    
    <p class="text-on-surface-variant max-w-md mb-6">
        The page you're looking for doesn't exist or has been removed.
    </p>

    <a href="{{ url_for('index.home') }}" 
       class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-primary/90 transition">
        Go Home
    </a>
</div>
{% endblock %}
